# ESPHome-Konfiguration für ESP32-CAM (AI-Thinker kompatibel)
# Aufgabe: Kamerabild per Snapshot-Endpunkt bereitstellen + LED steuern
# Die KI-Verarbeitung übernimmt vollständig das HA Addon (meter-reader).

esphome:
  name: wasserzaehler-cam
  friendly_name: "Wasserzähler Kamera"

esp32:
  board: esp32cam
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 40MHz

# ─── WLAN ──────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  reboot_timeout: 5min
  ap:
    ssid: "Wasserzaehler-Fallback"
    password: "meter12345"

captive_portal:

# ─── Logging ──────────────────────────────────────────────────────────────────
logger:
  level: WARN

# ─── Home Assistant API ────────────────────────────────────────────────────────
api:
  encryption:
    key: !secret api_key

# ─── OTA Updates ──────────────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: !secret ota_password

# ─── Webserver (ESPHome-UI + LED-Steuerung durch Addon) ───────────────────────
web_server:
  port: 80

# ─── Kamera (OV2640, AI-Thinker Pin-Belegung) ────────────────────────────────
esp32_camera:
  name: "Wasserzaehler"
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22

  resolution: 800x600
  jpeg_quality: 10
  vertical_flip: true
  horizontal_mirror: false

  aec_mode: auto
  ae_level: 0
  wb_mode: auto

  max_framerate: 2fps
  idle_framerate: 0.05fps
  frame_buffer_count: 2

# ─── Snapshot-Endpunkt (Port 8080) ────────────────────────────────────────────
# Das Addon ruft http://<ip>:8080/ auf (mode: snapshot liefert auf /)
esp32_camera_web_server:
  - port: 8080
    mode: snapshot

# ─── Flash-LED (GPIO4, PWM) ───────────────────────────────────────────────────
output:
  - platform: ledc
    pin: GPIO4
    id: flash_led
    frequency: 1000Hz
    channel: 2

light:
  - platform: monochromatic
    output: flash_led
    name: "Beleuchtung"
    id: led_light
    restore_mode: ALWAYS_OFF

# ─── Diagnose-Sensoren ────────────────────────────────────────────────────────
sensor:
  - platform: wifi_signal
    name: "WLAN Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

button:
  - platform: restart
    name: "Neustart"

status_led:
  pin:
    number: GPIO33
    inverted: true
