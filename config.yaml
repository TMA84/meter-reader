name: "Meter Reader"
version: "1.0.14"
slug: meter-reader
description: >-
  Liest analoge und digitale Zähler (Wasser, Gas, Strom) per Kamera aus.
  Nutzt TFLite-Modelle für die Ziffernerkennung. Die Bildaufnahme erfolgt
  über eine externe ESP32-CAM, die Verarbeitung läuft im Addon.
arch:
  - aarch64
  - amd64
url: "https://github.com/TMA84/meter-reader"
startup: application
boot: auto
init: false
ingress: true
ingress_port: 5000
ingress_entry: /
panel_icon: mdi:water-pump
panel_title: "Meter Reader"
homeassistant_api: true
hassio_api: true
map:
  - type: addon_config
    read_only: false
options:
  camera_url: "http://192.168.1.50:8080/snapshot"
  read_interval_minutes: 5
  mqtt_enabled: false
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic: "meter-reader/water/value"
schema:
  camera_url: url
  read_interval_minutes: "int(1,60)"
  mqtt_enabled: bool
  mqtt_host: str
  mqtt_port: "int(1,65535)"
  mqtt_username: "str?"
  mqtt_password: "password?"
  mqtt_topic: str
